id = "mise"
name = "Mise"
version = "0.1.0"
schema_version = 1
authors = ["raddish <raddishiow@gmail.com>"]
description = "Mise integration for Zed: schema-aware config editing, task-runner sync, and an MCP server for managing tools, tasks, and configuration."
repository = "https://github.com/raddishiow/zed-mise"

# Reuse the upstream TOML grammar (same grammar/commit the official `toml`
# extension ships) so Mise config files get identical TOML highlighting.
[grammars.toml]
repository = "https://github.com/tree-sitter/tree-sitter-toml"
commit = "342d9be207c2dba869b9967124c679b5e6fd0ebe"

# Grammar for `.tool-versions` files, vendored in this repo under
# tree-sitter-tool-versions/ (referenced by path at a pinned commit).
[grammars.tool_versions]
repository = "https://github.com/RaddishIoW/zed-mise"
commit = "ae63f11b379bd109c55941e00d41bded88cab60a"
path = "tree-sitter-tool-versions"

# Taplo (TOML language server) wired to the Mise language, configured at runtime
# to validate against Mise's published JSON schema.
[language_servers.mise-taplo]
name = "Taplo (Mise)"
languages = ["Mise"]

# Our own language server: version-bump inlay hints + upgrade code actions for
# mise.toml and .tool-versions (runs alongside taplo).
[language_servers.mise-lsp]
name = "Mise"
languages = ["Mise", "tool-versions"]

# MCP context server exposing mise tool/task/config operations to Zed's agent.
[context_servers.mise]
